<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#1a3a1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Flores Cariri">
  <link rel="manifest" href="manifest.json">
  <title>Flores do Cariri</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --verde-escuro: #0f2910;
      --verde-medio: #1e4a1e;
      --verde-vivo: #2d7a2d;
      --verde-claro: #4caf50;
      --dourado: #c8a84b;
      --bege: #f5efe0;
      --branco: #fdfaf4;
      --texto: #1a2e1a;
      --texto-leve: #4a6b4a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--verde-escuro);
      color: var(--branco);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    /* Fundo com textura de folhas */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(45,122,45,0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(200,168,75,0.08) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      padding: 0 20px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    /* Header */
    header {
      width: 100%;
      text-align: center;
      padding: 40px 0 10px;
    }

    .logo-icon {
      font-size: 48px;
      display: block;
      margin-bottom: 12px;
      filter: drop-shadow(0 4px 12px rgba(76,175,80,0.4));
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--branco);
      line-height: 1.2;
    }

    h1 span {
      color: var(--dourado);
      font-style: italic;
    }

    .subtitulo {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      margin-top: 6px;
      font-weight: 300;
      letter-spacing: 0.5px;
    }

    /* Status do modelo */
    #status-modelo {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: rgba(255,255,255,0.7);
      transition: all 0.4s;
    }

    #status-modelo.ok {
      background: rgba(76,175,80,0.12);
      border-color: rgba(76,175,80,0.3);
      color: #81c784;
    }

    #status-modelo.erro {
      background: rgba(244,67,54,0.12);
      border-color: rgba(244,67,54,0.3);
      color: #e57373;
    }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
      animation: pulse-dot 1.5s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    #status-modelo.ok .status-dot,
    #status-modelo.erro .status-dot { animation: none; }

    /* Área da câmera / preview */
    .camera-area {
      width: 100%;
      position: relative;
    }

    .camera-frame {
      width: 100%;
      aspect-ratio: 4/3;
      background: rgba(0,0,0,0.4);
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    #canvas-oculto { display: none; }

    #preview-foto {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
      border-radius: 20px;
    }

    .camera-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      color: rgba(255,255,255,0.3);
    }

    .camera-placeholder .icone { font-size: 48px; }
    .camera-placeholder p { font-size: 14px; }

    /* Cantos decorativos da câmera */
    .camera-frame::before,
    .camera-frame::after {
      content: '';
      position: absolute;
      width: 24px; height: 24px;
      border-color: var(--dourado);
      border-style: solid;
      border-width: 0;
      z-index: 2;
      opacity: 0.6;
    }
    .camera-frame::before {
      top: 12px; left: 12px;
      border-top-width: 2px;
      border-left-width: 2px;
      border-radius: 4px 0 0 0;
    }
    .camera-frame::after {
      bottom: 12px; right: 12px;
      border-bottom-width: 2px;
      border-right-width: 2px;
      border-radius: 0 0 4px 0;
    }

    /* Analisando overlay */
    #analisando-overlay {
      position: absolute;
      inset: 0;
      background: rgba(15,41,16,0.75);
      border-radius: 20px;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 14px;
      z-index: 3;
    }

    .spinner {
      width: 44px; height: 44px;
      border: 3px solid rgba(76,175,80,0.2);
      border-top-color: var(--verde-claro);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #analisando-overlay p {
      font-size: 14px;
      color: rgba(255,255,255,0.8);
    }

    /* Botões */
    .botoes {
      width: 100%;
      display: flex;
      gap: 12px;
    }

    .btn {
      flex: 1;
      padding: 16px;
      border: none;
      border-radius: 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn:active { transform: scale(0.97); }

    .btn-primario {
      background: var(--verde-claro);
      color: white;
      box-shadow: 0 4px 20px rgba(76,175,80,0.35);
    }

    .btn-primario:hover { background: #43a047; }

    .btn-secundario {
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.8);
      border: 1px solid rgba(255,255,255,0.12);
    }

    .btn-secundario:hover { background: rgba(255,255,255,0.12); }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none !important;
    }

    /* Resultado */
    #resultado {
      width: 100%;
      display: none;
    }

    .resultado-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    .resultado-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--verde-claro), var(--dourado));
    }

    .resultado-label {
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      margin-bottom: 8px;
    }

    .resultado-nome {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      font-weight: 700;
      color: var(--branco);
      margin-bottom: 4px;
      line-height: 1.2;
    }

    .resultado-cientifico {
      font-size: 13px;
      color: var(--dourado);
      font-style: italic;
      margin-bottom: 18px;
    }

    .barra-container {
      margin-bottom: 6px;
    }

    .barra-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 6px;
    }

    .barra-fundo {
      height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      overflow: hidden;
    }

    .barra-preenchimento {
      height: 100%;
      border-radius: 3px;
      background: linear-gradient(90deg, var(--verde-claro), var(--dourado));
      transition: width 0.8s ease;
      width: 0%;
    }

    .bioma-tag {
      display: inline-block;
      margin-top: 14px;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    .bioma-caatinga {
      background: rgba(200,168,75,0.15);
      color: var(--dourado);
      border: 1px solid rgba(200,168,75,0.3);
    }

    .bioma-brasil {
      background: rgba(76,175,80,0.15);
      color: #81c784;
      border: 1px solid rgba(76,175,80,0.3);
    }

    /* Top 3 */
    .top3-titulo {
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      margin: 20px 0 10px;
    }

    .top3-lista {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .top3-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: rgba(255,255,255,0.04);
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .top3-pos {
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      width: 20px;
      text-align: center;
    }

    .top3-nome {
      flex: 1;
      font-size: 13px;
      text-transform: capitalize;
    }

    .top3-pct {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      font-variant-numeric: tabular-nums;
    }

    /* Input arquivo oculto */
    #input-arquivo { display: none; }

    /* Offline banner */
    #offline-banner {
      display: none;
      width: 100%;
      background: rgba(200,168,75,0.15);
      border: 1px solid rgba(200,168,75,0.3);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 12px;
      color: var(--dourado);
      text-align: center;
    }

    /* Instrucoes */
    .instrucoes {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }

    .instrucao-item {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px;
      padding: 14px 10px;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .instrucao-item .icone { font-size: 22px; }
    .instrucao-item p { font-size: 11px; color: rgba(255,255,255,0.45); line-height: 1.4; }
  </style>
</head>
<body>
  <div class="container">

    <header>
      <span class="logo-icon">🌺</span>
      <h1>Flores do <span>Cariri</span></h1>
      <p class="subtitulo">Reconhecimento de flores · Caatinga & Brasil</p>
    </header>

    <div id="offline-banner">
      📡 Você está offline — o app continua funcionando normalmente
    </div>

    <div id="status-modelo">
      <span class="status-dot"></span>
      <span id="status-texto">Carregando modelo de IA...</span>
    </div>

    <div class="camera-area">
      <div class="camera-frame">
        <video id="video" autoplay playsinline muted></video>
        <img id="preview-foto" alt="Foto capturada">
        <div class="camera-placeholder" id="placeholder">
          <span class="icone">📷</span>
          <p>Câmera ou galeria</p>
        </div>
        <div id="analisando-overlay">
          <div class="spinner"></div>
          <p>Identificando flor...</p>
        </div>
      </div>
      <canvas id="canvas-oculto"></canvas>
    </div>

    <div class="botoes">
      <button class="btn btn-primario" id="btn-camera" onclick="abrirCamera()">
        📷 Câmera
      </button>
      <button class="btn btn-secundario" id="btn-foto" onclick="tirarFoto()" style="display:none">
        ✓ Capturar
      </button>
      <button class="btn btn-secundario" onclick="abrirGaleria()">
        🖼️ Galeria
      </button>
    </div>

    <input type="file" id="input-arquivo" accept="image/*" capture="environment">

    <div id="resultado"></div>

    <div class="instrucoes">
      <div class="instrucao-item">
        <span class="icone">🌿</span>
        <p>Aponte para uma flor</p>
      </div>
      <div class="instrucao-item">
        <span class="icone">☀️</span>
        <p>Boa iluminação ajuda</p>
      </div>
      <div class="instrucao-item">
        <span class="icone">🔍</span>
        <p>Centralize a flor</p>
      </div>
    </div>

  </div>

  <!-- TensorFlow.js -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>

  <script>
    // -------------------------------------------------------
    // DADOS DAS FLORES
    // -------------------------------------------------------
    const DADOS_FLORES = {
      alamanda:          { cientifico: 'Allamanda cathartica',      bioma: 'cariri' },
      anthurio:          { cientifico: 'Anthurium sp.',             bioma: 'brasil' },
      bromelia:          { cientifico: 'Bromeliaceae',              bioma: 'brasil' },
      caroa:             { cientifico: 'Neoglaziovia variegata',    bioma: 'cariri' },
      catingueira:       { cientifico: 'Poincianella bracteosa',    bioma: 'cariri' },
      chanana:           { cientifico: 'Turnera subulata',          bioma: 'cariri' },
      coroa_de_frade:    { cientifico: 'Melocactus zehntneri',      bioma: 'cariri' },
      cumaru:            { cientifico: 'Amburana cearensis',        bioma: 'cariri' },
      facheiro:          { cientifico: 'Pilosocereus pachycladus',  bioma: 'cariri' },
      heliconia:         { cientifico: 'Heliconia sp.',             bioma: 'brasil' },
      hibisco:           { cientifico: 'Hibiscus rosa-sinensis',    bioma: 'brasil' },
      ipe_amarelo:       { cientifico: 'Handroanthus albus',        bioma: 'brasil' },
      juca:              { cientifico: 'Libidibia ferrea',          bioma: 'cariri' },
      jurema_preta:      { cientifico: 'Mimosa tenuiflora',         bioma: 'cariri' },
      macambira:         { cientifico: 'Bromelia laciniosa',        bioma: 'cariri' },
      mandacaru:         { cientifico: 'Cereus jamacaru',           bioma: 'cariri' },
      maracuja_do_mato:  { cientifico: 'Passiflora cincinnata',     bioma: 'cariri' },
      mororó:            { cientifico: 'Bauhinia cheilantha',       bioma: 'cariri' },
      mucambe:           { cientifico: 'Cleome spinosa',            bioma: 'cariri' },
      mulungu:           { cientifico: 'Erythrina velutina',        bioma: 'cariri' },
      orquidea_cattleya: { cientifico: 'Cattleya sp.',              bioma: 'brasil' },
      pacote:            { cientifico: 'Cochlospermum vitifolium',  bioma: 'cariri' },
      palma:             { cientifico: 'Opuntia ficus-indica',      bioma: 'cariri' },
      primavera:         { cientifico: 'Bougainvillea sp.',         bioma: 'brasil' },
      vitoria_regia:     { cientifico: 'Victoria amazonica',        bioma: 'brasil' },
      xique_xique:       { cientifico: 'Pilosocereus gounellei',    bioma: 'cariri' },
    };

    // -------------------------------------------------------
    // ESTADO DO APP
    // -------------------------------------------------------
    let modelo = null;
    let labels = [];
    let streamCamera = null;
    let cameraAberta = false;

    // -------------------------------------------------------
    // CARREGA O MODELO E LABELS
    // -------------------------------------------------------
    async function iniciar() {
      try {
        // Carrega labels
        const resp = await fetch('labels.txt');
        const texto = await resp.text();
        labels = texto.trim().split('\n').map(l => l.trim()).filter(Boolean);

        // Carrega modelo TF.js
        modelo = await tf.loadGraphModel('modelo/model.json');

        setStatus('ok', `Modelo pronto · ${labels.length} flores`);
        document.getElementById('btn-camera').disabled = false;
      } catch (e) {
        setStatus('erro', 'Erro ao carregar modelo. Verifique os arquivos.');
        console.error(e);
      }
    }

    function setStatus(tipo, texto) {
      const el = document.getElementById('status-modelo');
      el.className = `${tipo}`;
      document.getElementById('status-texto').textContent = texto;
    }

    // -------------------------------------------------------
    // CÂMERA
    // -------------------------------------------------------
    async function abrirCamera() {
      try {
        streamCamera = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment', width: 640, height: 480 }
        });
        const video = document.getElementById('video');
        video.srcObject = streamCamera;
        video.style.display = 'block';
        document.getElementById('placeholder').style.display = 'none';
        document.getElementById('preview-foto').style.display = 'none';
        document.getElementById('btn-camera').style.display = 'none';
        document.getElementById('btn-foto').style.display = 'flex';
        document.getElementById('resultado').style.display = 'none';
        cameraAberta = true;
      } catch (e) {
        // Fallback para galeria se câmera não disponível
        abrirGaleria();
      }
    }

    function tirarFoto() {
      const video = document.getElementById('video');
      const canvas = document.getElementById('canvas-oculto');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext('2d').drawImage(video, 0, 0);

      // Para a câmera
      if (streamCamera) {
        streamCamera.getTracks().forEach(t => t.stop());
        streamCamera = null;
      }

      // Mostra preview
      const preview = document.getElementById('preview-foto');
      preview.src = canvas.toDataURL('image/jpeg', 0.9);
      preview.style.display = 'block';
      video.style.display = 'none';
      document.getElementById('btn-foto').style.display = 'none';
      document.getElementById('btn-camera').style.display = 'flex';
      cameraAberta = false;

      identificar(canvas);
    }

    // -------------------------------------------------------
    // GALERIA
    // -------------------------------------------------------
    function abrirGaleria() {
      if (cameraAberta && streamCamera) {
        streamCamera.getTracks().forEach(t => t.stop());
        streamCamera = null;
        cameraAberta = false;
        document.getElementById('video').style.display = 'none';
        document.getElementById('btn-foto').style.display = 'none';
        document.getElementById('btn-camera').style.display = 'flex';
      }
      document.getElementById('input-arquivo').click();
    }

    document.getElementById('input-arquivo').addEventListener('change', function(e) {
      const arquivo = e.target.files[0];
      if (!arquivo) return;

      const reader = new FileReader();
      reader.onload = function(ev) {
        const img = new Image();
        img.onload = function() {
          const canvas = document.getElementById('canvas-oculto');
          canvas.width = img.width;
          canvas.height = img.height;
          canvas.getContext('2d').drawImage(img, 0, 0);

          const preview = document.getElementById('preview-foto');
          preview.src = ev.target.result;
          preview.style.display = 'block';
          document.getElementById('placeholder').style.display = 'none';

          identificar(canvas);
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(arquivo);
      this.value = '';
    });

    // -------------------------------------------------------
    // IDENTIFICAÇÃO
    // -------------------------------------------------------
    async function identificar(canvas) {
      if (!modelo) {
        alert('Modelo ainda carregando, aguarde.');
        return;
      }

      // Mostra overlay de carregamento
      document.getElementById('analisando-overlay').style.display = 'flex';
      document.getElementById('resultado').style.display = 'none';

      await new Promise(r => setTimeout(r, 50)); // deixa o DOM atualizar

      try {
        // Prepara a imagem: redimensiona para 224x224 e normaliza
        const tensor = tf.tidy(() => {
          const imgTensor = tf.browser.fromPixels(canvas);
          const redimensionada = tf.image.resizeBilinear(imgTensor, [224, 224]);
          const normalizada = redimensionada.div(255.0);
          return normalizada.expandDims(0); // [1, 224, 224, 3]
        });

        // Roda o modelo
        const predicoes = await modelo.predict(tensor).data();
        tensor.dispose();

        // Pega os resultados ordenados
        const resultados = Array.from(predicoes)
          .map((conf, i) => ({ label: labels[i], confianca: conf * 100 }))
          .sort((a, b) => b.confianca - a.confianca);

        mostrarResultado(resultados);

      } catch (e) {
        console.error(e);
        alert('Erro ao identificar. Tente outra foto.');
      } finally {
        document.getElementById('analisando-overlay').style.display = 'none';
      }
    }

    // -------------------------------------------------------
    // EXIBE O RESULTADO
    // -------------------------------------------------------
    function mostrarResultado(resultados) {
      const melhor = resultados[0];
      const dados = DADOS_FLORES[melhor.label] || { cientifico: '', bioma: 'brasil' };
      const nomeFormatado = melhor.label.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
      const ehCariri = dados.bioma === 'cariri';

      const top3 = resultados.slice(0, 3);

      const html = `
        <div class="resultado-card">
          <div class="resultado-label">Flor identificada</div>
          <div class="resultado-nome">${nomeFormatado}</div>
          ${dados.cientifico ? `<div class="resultado-cientifico">${dados.cientifico}</div>` : ''}

          <div class="barra-container">
            <div class="barra-label">
              <span>Confiança</span>
              <span>${melhor.confianca.toFixed(1)}%</span>
            </div>
            <div class="barra-fundo">
              <div class="barra-preenchimento" id="barra" style="width:0%"></div>
            </div>
          </div>

          <span class="bioma-tag ${ehCariri ? 'bioma-caatinga' : 'bioma-brasil'}">
            ${ehCariri ? '🌵 Cariri / Caatinga' : '🌿 Flora Brasileira'}
          </span>

          <div class="top3-titulo">Outras possibilidades</div>
          <div class="top3-lista">
            ${top3.map((r, i) => `
              <div class="top3-item">
                <span class="top3-pos">${i === 0 ? '●' : `${i + 1}°`}</span>
                <span class="top3-nome">${r.label.replace(/_/g, ' ')}</span>
                <span class="top3-pct">${r.confianca.toFixed(1)}%</span>
              </div>
            `).join('')}
          </div>
        </div>
      `;

      const divResultado = document.getElementById('resultado');
      divResultado.innerHTML = html;
      divResultado.style.display = 'block';

      // Anima a barra de confiança
      setTimeout(() => {
        const barra = document.getElementById('barra');
        if (barra) barra.style.width = `${melhor.confianca}%`;
      }, 100);
    }

    // -------------------------------------------------------
    // OFFLINE DETECTION
    // -------------------------------------------------------
    function verificarOnline() {
      document.getElementById('offline-banner').style.display =
        navigator.onLine ? 'none' : 'block';
    }
    window.addEventListener('online', verificarOnline);
    window.addEventListener('offline', verificarOnline);
    verificarOnline();

    // -------------------------------------------------------
    // REGISTRA SERVICE WORKER (para funcionar offline)
    // -------------------------------------------------------
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(console.error);
    }

    // -------------------------------------------------------
    // INICIA
    // -------------------------------------------------------
    iniciar();
  </script>
</body>
</html>
